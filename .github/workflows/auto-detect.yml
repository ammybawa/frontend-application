name: Auto Detect & Run

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
      node: ${{ steps.detect.outputs.node }}
      html: ${{ steps.detect.outputs.html }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          echo "python=false" >> $GITHUB_OUTPUT
          echo "node=false" >> $GITHUB_OUTPUT
          echo "html=false" >> $GITHUB_OUTPUT

          if [ -f "requirements.txt" ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi

          if [ -f "package.json" ]; then
            echo "node=true" >> $GITHUB_OUTPUT
          fi

          if ls *.html 1> /dev/null 2>&1; then
            echo "html=true" >> $GITHUB_OUTPUT
          fi

  python-job:
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python script
        run: python main.py

  node-job:
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run app
        run: npm run build

  html-job:
    needs: detect
    if: needs.detect.outputs.html == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "HTML project detected"
          ls -la
