name: Auto Detect, Build & Deploy
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
      node: ${{ steps.detect.outputs.node }}
      html: ${{ steps.detect.outputs.html }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          echo "python=false" >> $GITHUB_OUTPUT
          echo "node=false" >> $GITHUB_OUTPUT
          echo "html=false" >> $GITHUB_OUTPUT

          if [ -f "requirements.txt" ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi

          if [ -f "package.json" ]; then
            echo "node=true" >> $GITHUB_OUTPUT
          fi

          if ls *.html 1> /dev/null 2>&1 && [ ! -f "package.json" ]; then
            echo "html=true" >> $GITHUB_OUTPUT
          fi

  # ───────────────────────────────────────────
  # PYTHON JOB
  # ───────────────────────────────────────────
  python-job:
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python app
        run: python main.py

  # ───────────────────────────────────────────
  # NODE JOB
  # ───────────────────────────────────────────
  node-job:
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean old dependencies
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          rm -f package-shrinkwrap.json

      - name: Install dependencies
        run: |
          npm install \
            --prefer-offline=false \
            --include=optional \
            --ignore-scripts=false
        env:
          SHARP_IGNORE_GLOBAL_LIBVIPS: "1"
          npm_config_optional: "true"
          npm_config_ignore_scripts: "false"

      - name: Rebuild native modules
        run: |
          npm rebuild @tailwindcss/oxide --update-binary || \
          npm install @tailwindcss/oxide --prefer-offline=false

      - name: Debug project
        run: |
          echo "=== Directory Structure ==="
          ls -la
          echo "=== package.json ==="
          cat package.json
          echo "=== Node & NPM versions ==="
          node -v
          npm -v

      - name: Run build (if exists)
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script found, skipping"
          fi

      - name: Run app (optional)
        run: |
          if npm run | grep -q "start"; then
            npm start &
            sleep 5
          else
            echo "No start script found, skipping"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          if-no-files-found: warn

  # ───────────────────────────────────────────
  # HTML JOB
  # ───────────────────────────────────────────
  html-job:
    needs: detect
    if: needs.detect.outputs.html == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML project detected
        run: |
          echo "Static HTML project"
          ls -la

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .
          if-no-files-found: warn

  # ───────────────────────────────────────────
  # DEPLOY JOB (only on push to main)
  # ───────────────────────────────────────────
  deploy:
    needs: [detect, node-job]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect.outputs.node == 'true' &&
      needs.node-job.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Verify build files
        run: |
          echo "=== Build files to deploy ==="
          ls -la dist/

      - name: Copy build files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/"
          target: /var/www/html/fronted_zenDash_nextjs_application      # 👈 change to your server path
          rm: true                          # removes old files before uploading

      - name: Restart server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "=== Deployment started ==="

            # Navigate to app directory
            cd /var/www/html/fronted_zenDash_nextjs_application           # 👈 change to your server path

            # Show deployed files
            echo "=== Deployed files ==="
            ls -la

            # ── Choose ONE based on your server setup ──

            # Option 1: Nginx (static site) ✅
            sudo systemctl reload nginx
            echo "Nginx reloaded successfully"

            # Option 2: PM2 (Node app) — uncomment if needed
            # pm2 restart your-app-name
            # pm2 save

            # Option 3: Apache — uncomment if needed
            # sudo systemctl reload apache2

            echo "=== Deployment complete ==="

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
