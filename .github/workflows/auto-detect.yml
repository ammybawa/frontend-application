name: Auto Detect & Run

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
      node: ${{ steps.detect.outputs.node }}
      html: ${{ steps.detect.outputs.html }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          echo "python=false" >> $GITHUB_OUTPUT
          echo "node=false" >> $GITHUB_OUTPUT
          echo "html=false" >> $GITHUB_OUTPUT

          # Detect Python
          if [ -f "requirements.txt" ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi

          # Detect Node (priority)
          if [ -f "package.json" ]; then
            echo "node=true" >> $GITHUB_OUTPUT
          fi

          # Detect HTML ONLY if Node is NOT present
          if ls *.html 1> /dev/null 2>&1 && [ ! -f "package.json" ]; then
            echo "html=true" >> $GITHUB_OUTPUT
          fi

  python-job:
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python app
        run: python main.py

  node-job:
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Debug project
        run: |
          echo "Listing files..."
          ls -la
          echo "Showing package.json..."
          cat package.json

      - name: Run build (if exists)
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script found, skipping build"
          fi

      - name: Run app (optional)
        run: |
          if npm run | grep -q "start"; then
            npm start &
            sleep 5
          else
            echo "No start script found, skipping run"
          fi

  html-job:
    needs: detect
    if: needs.detect.outputs.html == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: HTML project detected
        run: |
          echo "Static HTML project"
          ls -la
