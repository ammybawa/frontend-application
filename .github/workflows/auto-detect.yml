name: Auto Detect & Run

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
      node: ${{ steps.detect.outputs.node }}
      html: ${{ steps.detect.outputs.html }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          echo "python=false" >> $GITHUB_OUTPUT
          echo "node=false" >> $GITHUB_OUTPUT
          echo "html=false" >> $GITHUB_OUTPUT

          # Python detection
          if [ -f "requirements.txt" ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi

          # Node detection (priority)
          if [ -f "package.json" ]; then
            echo "node=true" >> $GITHUB_OUTPUT
          fi

          # HTML only if Node not present
          if ls *.html 1> /dev/null 2>&1 && [ ! -f "package.json" ]; then
            echo "html=true" >> $GITHUB_OUTPUT
          fi

  python-job:
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python app
        run: python main.py

  node-job:
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 🔥 FIX FOR TAILWIND / VITE ISSUE
      - name: Clean old dependencies
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: Install dependencies (fix native binding issue)
        run: npm install --include=optional

      - name: Rebuild native modules
        run: npm rebuild

      # Debug (optional but useful)
      - name: Debug project
        run: |
          echo "Files:"
          ls -la
          echo "package.json:"
          cat package.json

      - name: Run build (if exists)
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script found, skipping"
          fi

      - name: Run app (optional)
        run: |
          if npm run | grep -q "start"; then
            npm start &
            sleep 5
          else
            echo "No start script found, skipping"
          fi

  html-job:
    needs: detect
    if: needs.detect.outputs.html == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: HTML project detected
        run: |
          echo "Static HTML project"
          ls -la
