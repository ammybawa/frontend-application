name: Auto Detect, Build & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
      node: ${{ steps.detect.outputs.node }}
      html: ${{ steps.detect.outputs.html }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          echo "python=false" >> $GITHUB_OUTPUT
          echo "node=false" >> $GITHUB_OUTPUT
          echo "html=false" >> $GITHUB_OUTPUT

          if [ -f "requirements.txt" ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi

          if [ -f "package.json" ]; then
            echo "node=true" >> $GITHUB_OUTPUT
          fi

          if ls *.html 1> /dev/null 2>&1 && [ ! -f "package.json" ]; then
            echo "html=true" >> $GITHUB_OUTPUT
          fi

  # ───────── PYTHON ─────────
  python-job:
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt
      - run: python main.py

  # ───────── NODE ─────────
  node-job:
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean dependencies
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: Install dependencies (fix Tailwind issue)
        run: npm install --include=optional --force

      - name: Rebuild native modules
        run: npm rebuild

      - name: Build project
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script found"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          if-no-files-found: warn

  # ───────── DEPLOY ─────────
  deploy:
    needs: [detect, node-job]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect.outputs.node == 'true' &&
      needs.node-job.result == 'success'

    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Verify files
        run: ls -la dist/

      # 🔥 UPDATED: PASSWORD BASED SCP
      - name: Copy build files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/"
          target: "/var/www/html/fronted_zenDash_nextjs_application"
          rm: true

      # 🔥 UPDATED: PASSWORD BASED SSH
      - name: Restart server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "=== Deployment started ==="
            cd /var/www/html/fronted_zenDash_nextjs_application
            ls -la
            sudo systemctl reload nginx
            echo "=== Deployment complete ==="

      - name: Deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
